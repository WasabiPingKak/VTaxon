    <style>
      body { margin: 0; background: #080d15; color: #e2e8f0; }
      *, *::before, *::after { box-sizing: border-box; }
      a { color: #38bdf8; }
      @keyframes vtaxonSpin { to { transform: rotate(360deg); } }
      @keyframes vtaxonPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      /* TreeNode hover — CSS-only, replaces JS onMouseEnter/onMouseLeave */
      .vtaxon-tree-node { background: transparent; }
      .vtaxon-tree-node--highlighted { background: #FFF8E1; }
      .vtaxon-tree-node--clickable:hover { background: #f5f5f5; }
      .vtaxon-tree-node--highlighted.vtaxon-tree-node--clickable:hover { background: #FFF8E1; }
      /* Dark thin scrollbar for panels */
      .vtaxon-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
      .vtaxon-scroll::-webkit-scrollbar { width: 4px; }
      .vtaxon-scroll::-webkit-scrollbar-track { background: transparent; }
      .vtaxon-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
      .vtaxon-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
      /* Footer link hover */
      .vtaxon-footer-link { color: rgba(255,255,255,0.3); text-decoration: none; }
      .vtaxon-footer-link:hover { color: rgba(255,255,255,0.5); }
    </style>
