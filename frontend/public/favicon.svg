<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark round background -->
  <rect width="32" height="32" rx="6" fill="#0d1526"/>

  <!-- Main trunk (short) -->
  <line x1="16" y1="28" x2="16" y2="23" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left branch -->
  <line x1="16" y1="23" x2="8" y2="8" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right branch -->
  <line x1="16" y1="23" x2="24" y2="8" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left sub-branches (smaller) -->
  <line x1="8" y1="8" x2="5" y2="4" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="8" x2="11.5" y2="4.5" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Right sub-branches (smaller) -->
  <line x1="24" y1="8" x2="20.5" y2="4.5" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="27" y2="4" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Leaf dots at tips -->
  <circle cx="5" cy="4" r="1.5" fill="#34d399"/>
  <circle cx="11.5" cy="4.5" r="1.5" fill="#34d399"/>
  <circle cx="20.5" cy="4.5" r="1.5" fill="#34d399"/>
  <circle cx="27" cy="4" r="1.5" fill="#34d399"/>
</svg>
