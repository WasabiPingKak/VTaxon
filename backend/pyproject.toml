[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort (import sorting)
  "UP",   # pyupgrade
]
ignore = [
  "E501",  # line too long (handled by formatter)
  "UP028", # yield from can't be used inside try/except
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__ are intentional

[tool.mypy]
python_version = "3.12"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code"]
warn_unused_ignores = false  # CI vs local have different stubs installed

# Libraries without type stubs
[[tool.mypy.overrides]]
module = ["resend.*", "flasgger.*", "pythonjsonlogger.*", "opencc.*", "flask_cors.*"]
ignore_missing_imports = true

# flask-sqlalchemy db.Model is dynamically created — mypy cannot resolve it
[[tool.mypy.overrides]]
module = "app.models"
disable_error_code = ["name-defined", "misc", "no-any-return"]

[tool.pytest.ini_options]
addopts = "-x -q"
testpaths = ["tests"]
filterwarnings = [
  "error",
  # SQLite in-memory + SQLAlchemy pool: GC may finalize pooled connections
  # during pytest teardown. Not an issue in production (PostgreSQL).
  "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
omit = ["tests/*", "tools/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
]
