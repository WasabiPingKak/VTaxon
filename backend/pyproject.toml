[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort (import sorting)
  "UP",   # pyupgrade
]
ignore = [
  "E501",  # line too long (handled by formatter)
  "UP028", # yield from can't be used inside try/except
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__ are intentional

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true
disallow_untyped_defs = false
ignore_missing_imports = true
show_error_codes = true
enable_error_code = ["ignore-without-code"]

[[tool.mypy.overrides]]
module = [
    "app.utils.*",
    "app.cache",
    "app.config",
    "app.extensions",
    "app.limiter",
    "app.swagger",
]
disallow_untyped_defs = true
warn_return_any = true

# flask-sqlalchemy db.Model is dynamically created — mypy cannot resolve it
[[tool.mypy.overrides]]
module = "app.models"
disable_error_code = ["name-defined"]

[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing -x -q"
testpaths = ["tests"]
filterwarnings = [
  "error",
  # SQLite in-memory + SQLAlchemy pool: GC may finalize pooled connections
  # during pytest teardown. Not an issue in production (PostgreSQL).
  "ignore::pytest.PytestUnraisableExceptionWarning",
]
