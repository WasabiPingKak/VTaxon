name: Deploy Staging

on:
  push:
    branches: [develop]

env:
  GCP_REGION: asia-east1
  DOCKER_REGISTRY: asia-east1-docker.pkg.dev
  CLOUD_RUN_SERVICE: vtaxon-api-staging

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint backend (Ruff)
        uses: astral-sh/ruff-action@v3
        with:
          src: backend/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Typecheck backend (mypy)
        working-directory: backend
        run: python -m mypy app/ --config-file pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: pytest backend/tests -q

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

  deploy-backend:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.DOCKER_REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.DOCKER_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vtaxon-docker/vtaxon-api:staging-${{ github.sha }}
          docker build -t $IMAGE backend/
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.DOCKER_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vtaxon-docker/vtaxon-api:staging-${{ github.sha }}
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image $IMAGE \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --set-env-vars "^||^FLASK_ENV=staging||DB_SCHEMA=staging||ENABLE_SWAGGER=true||ALLOWED_ORIGINS=https://vtaxon-staging.web.app||WEBHOOK_BASE_URL=https://vtaxon-api-staging-135773662063.asia-east1.run.app||GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}||CLOUD_TASKS_LOCATION=${{ env.GCP_REGION }}||CLOUD_TASKS_QUEUE=websub-subscribe||CLOUD_RUN_SERVICE_URL=https://vtaxon-api-staging-135773662063.asia-east1.run.app" \
            --set-secrets "\
          DATABASE_URL=DATABASE_URL_STAGING:latest,\
          SUPABASE_URL=SUPABASE_URL:latest,\
          SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,\
          SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,\
          SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,\
          TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest,\
          TWITCH_CLIENT_SECRET=TWITCH_CLIENT_SECRET:latest,\
          TWITCH_WEBHOOK_SECRET=TWITCH_WEBHOOK_SECRET:latest,\
          RESEND_API_KEY=RESEND_API_KEY:latest,\
          ADMIN_NOTIFY_EMAILS=ADMIN_NOTIFY_EMAILS:latest,\
          EMAIL_FROM=EMAIL_FROM:latest,\
          YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest,\
          CRON_SECRET=CRON_SECRET:latest"

  deploy-frontend:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          target: staging
          channelId: live
