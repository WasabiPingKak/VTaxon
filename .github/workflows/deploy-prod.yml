name: Deploy Production

on:
  push:
    branches: [main]

env:
  GCP_REGION: asia-east1
  DOCKER_REGISTRY: asia-east1-docker.pkg.dev
  CLOUD_RUN_SERVICE: vtaxon-api-prod

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.DOCKER_REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.DOCKER_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vtaxon-docker/vtaxon-api:prod-${{ github.sha }}
          docker build -t $IMAGE backend/
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.DOCKER_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/vtaxon-docker/vtaxon-api:prod-${{ github.sha }}
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image $IMAGE \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "FLASK_ENV=production,ALLOWED_ORIGINS=https://vtaxon.web.app" \
            --set-secrets "\
          DATABASE_URL=DATABASE_URL_PROD:latest,\
          SECRET_KEY=SECRET_KEY_PROD:latest,\
          SUPABASE_URL=SUPABASE_URL:latest,\
          SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,\
          SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,\
          SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,\
          TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Firebase Hosting (prod)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          target: prod
          channelId: live
